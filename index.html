<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ATRIUM — App shell</title>
    <meta
      name="description"
      content="ATRIUM - app shell navigable (accueil, dashboard, leçon, résultats), compatible GitHub Pages."
    />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#24326f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="ATRIUM" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml" />
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("atrium-theme");
          var theme = saved || (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
          document.documentElement.setAttribute("data-theme", theme);
          document.documentElement.style.colorScheme = theme;
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700;800&family=Spectral:wght@500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#view-root">Aller au contenu principal</a>
    <div id="app"></div>
    <script src="assets/js/runtime-config.js"></script>
    <script type="module" src="assets/js/app.js"></script>
  </body>
</html>
